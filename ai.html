<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Great Outdoors Joke Generator</title>
    <style>
        body {
            font-family: 'Trebuchet MS', sans-serif;
            background-color: #1a472a; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .joke-card {
            background-color: #8b4513; 
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            text-align: center;
            width: 90%;
            max-width: 550px;
            border: 5px solid #5d2e0a;
        }

        h1 { margin-top: 0; color: #f1c40f; text-shadow: 2px 2px #000; }

        .box {
            background: #fef9e7;
            color: #333;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        #punchline {
            color: #e67e22;
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
            display: none; 
        }

        .controls { display: flex; flex-direction: column; gap: 10px; }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover { background-color: #2ecc71; transform: translateY(-2px); }

        .nav-links {
            margin-top: 25px;
        }

        .back-link {
            color: #ecf0f1;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 2px;
        }

        .back-link:hover {
            color: #f1c40f;
            border-color: #f1c40f;
        }
    </style>
</head>
<body>

    <div class="joke-card">
        <h1>🌲 Adventure Funnies</h1>
        
        <div class="box">
            <div id="setup">Ready for a trail-rated laugh?</div>
            <div id="punchline"></div>
        </div>
        
        <div class="controls">
            <button id="next-btn" onclick="newJoke()">Get a New Joke</button>
            <button id="reveal-btn" onclick="revealPunchline()" style="display:none;">Reveal Answer 🔍</button>
        </div>

        <div class="nav-links">
            <a href="index.html" class="back-link">Home</a>
            <span style="color: white; padding: 0 10px;">|</span>
            <a href="fromscratch.html" class="back-link">Southern UT</a>
        </div>
    </div>

    <script>
        const jokes = [
            { q: "Why did the hiker sit on the edge of Bryce Canyon?", a: "Because he wanted to see the 'hoodoo' voodoo!" },
            { q: "What's a Zion ranger's favorite type of music?", a: "Rock and Roll!" },
            { q: "Why don't the arches in Moab ever get lonely?", a: "Because they're always hanging out together." },
            { q: "What do you call a hiker who is happy?", a: "A happy camper!" },
            { q: "Why did the mountain climber break up with the mountain?", a: "Because it had too many peaks and valleys." },
            { q: "What did the rock say to the geologist?", a: "Don't take me for granite!" },
            { q: "Why did the ski instructor bring a ladder?", a: "Because he wanted to go to high school!" },
            { q: "What's the difference between a skier and a snowboarder?", a: "About three days in the hospital." },
            { q: "Why is it so easy for a tree to access the internet?", a: "They just log in!" },
            { q: "What do you call a bear with no teeth?", a: "A gummy bear!" },
            { q: "Why don't mountains ever get cold in the winter?", a: "Because they wear snow caps!" },
            { q: "What did the campfire say to the marshmallow?", a: "You're toast!" },
            { q: "Why are hiking boots so good at telling stories?", a: "They have a lot of soul (sole)." },
            { q: "What do you call it when a camper disappears?", a: "A mis-tent-understanding!" },
            { q: "Why did the bicycle fall over on the mountain trail?", a: "Because it was two-tired!" }
        ];

        let currentJoke = {};

        function newJoke() {
            const setupDiv = document.getElementById('setup');
            const punchlineDiv = document.getElementById('punchline');
            const revealBtn = document.getElementById('reveal-btn');
            
            currentJoke = jokes[Math.floor(Math.random() * jokes.length)];
            
            setupDiv.innerText = currentJoke.q;
            punchlineDiv.style.display = 'none';
            punchlineDiv.innerText = currentJoke.a;
            
            revealBtn.style.display = 'block';
        }

        function revealPunchline() {
            const punchlineDiv = document.getElementById('punchline');
            const revealBtn = document.getElementById('reveal-btn');
            
            punchlineDiv.style.display = 'block';
            revealBtn.style.display = 'none';
        }
    </script>

</body>
</html>
